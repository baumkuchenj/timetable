<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>駅案内表示</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="screen">
        <header class="station-panel">
            <h1 id="stationName" class="station-name">--駅</h1>
        </header>

        <section class="time-panel" aria-label="現在時刻">
            <p class="panel-label">現在時刻</p>
            <p id="currentTime" class="clock">--:--</p>
        </section>

        <section class="departures-panel" aria-label="次発案内">
            <p id="nextTrainText" class="departures hidden"></p>
            <p id="loadingText" class="departures muted">読み込み中...</p>
            <p id="errorText" class="status hidden">時刻表の読み込みに失敗しました</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
